<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>JZ Game</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d83ed">
  <!-- Premium Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #0d83ed;
      --primary-glow: rgba(13, 131, 237, 0.5);
      --accent: #f43f5e;
      --accent-glow: rgba(244, 63, 94, 0.5);
      --gold: #fbbf24;
      --gold-glow: rgba(251, 191, 36, 0.5);
      --bg: #09090b;
      --panel-bg: rgba(15, 15, 20, 0.7);
      --panel-border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: #f4f4f5;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* Glassmorphism UI Panels */
    .panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      background: rgba(9, 9, 11, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: opacity 0.3s ease, visibility 0.3s ease;
      opacity: 0;
      visibility: hidden;
    }

    .panel.active {
      opacity: 1;
      visibility: visible;
    }

    .glass-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 40px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                  0 0 40px rgba(13, 131, 237, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo-container {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 0 20px var(--primary-glow);
      overflow: hidden;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-container img {
      width: 105%;
      height: 105%;
      object-fit: cover;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #3b82f6 0%, #0d83ed 50%, #d946ef 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(13, 131, 237, 0.3);
      margin-bottom: 4px;
    }

    .score-label {
      font-size: 1.1rem;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
    }

    /* Buttons */
    .btn {
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #0d83ed 0%, #0284c7 100%);
      border: none;
      border-radius: 16px;
      padding: 16px 32px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 8px 16px var(--primary-glow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px var(--primary-glow);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--panel-border);
      color: #d4d4d8;
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: none;
      color: #fff;
    }

    /* Live HUD Layer */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #hud.active {
      opacity: 1;
    }

    .hud-stat {
      background: rgba(15, 15, 20, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--panel-border);
      padding: 12px 20px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
    }

    .hud-stat .label {
      font-size: 0.8rem;
      color: #a1a1aa;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hud-stat .value {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
    }

    #hud-score .value {
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary-glow);
    }

    #hud-coins .value {
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold-glow);
    }

    .hud-buttons {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .circle-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(15, 15, 20, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid var(--panel-border);
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .circle-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
    }

    /* Swipe Instruction Overlay for Mobile */
    #touch-instruction {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      background: rgba(15, 15, 20, 0.8);
      border: 1px solid var(--panel-border);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      color: #a1a1aa;
      pointer-events: none;
      display: none;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    @media (max-width: 768px) {
      #touch-instruction {
        display: block;
      }
      h1 {
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>

  <!-- 3D Render Target -->
  <div id="canvas-container"></div>

  <!-- HUD -->
  <div id="hud">
    <div style="display: flex; gap: 16px;">
      <div class="hud-stat" id="hud-score">
        <span class="label">Score</span>
        <span class="value" id="score-val">0</span>
      </div>
      <div class="hud-stat" id="hud-coins">
        <span class="label">Coins</span>
        <span class="value" id="coins-val">0</span>
      </div>
    </div>
    <div class="hud-buttons">
      <button class="circle-btn" id="pause-btn">⏸</button>
    </div>
  </div>

  <!-- Mobile Gestures Alert -->
  <div id="touch-instruction">Swipe Left/Right to turn, Up to Jump, Down to Slide</div>

  <!-- MAIN MENU -->
  <div class="panel active" id="menu-panel">
    <div class="glass-card">
      <div class="logo-container">
        <!-- Renders the custom hummingbird logo provided by user -->
        <img src="logo.jpg" alt="JZ Game Logo">
      </div>
      <div>
        <h1>JZ GAME</h1>
        <p style="color: #a1a1aa; letter-spacing: 3px; font-size: 0.9rem; font-weight: 600;">3D INFINITE RUNNER</p>
      </div>
      <div style="border-top: 1px solid var(--panel-border); border-bottom: 1px solid var(--panel-border); width: 100%; padding: 12px 0;">
        <span class="score-label">BEST RECORD</span>
        <div class="score-value" id="high-score-val">0</div>
      </div>
      <button class="btn" id="play-btn">
        <span>PLAY NOW</span>
        <span style="font-size: 1.4rem;">▶</span>
      </button>
    </div>
  </div>

  <!-- PAUSE MENU -->
  <div class="panel" id="pause-panel">
    <div class="glass-card">
      <h2 style="font-size: 2.2rem; font-weight: 800; color: #fff;">GAME PAUSED</h2>
      <button class="btn" id="resume-btn">RESUME</button>
      <button class="btn btn-secondary" id="restart-pause-btn">RESTART</button>
      <button class="btn btn-secondary" id="exit-btn">MAIN MENU</button>
    </div>
  </div>

  <!-- GAME OVER MENU -->
  <div class="panel" id="game-over-panel">
    <div class="glass-card" style="box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 40px var(--accent-glow); border-color: rgba(244, 63, 94, 0.2);">
      <h2 style="font-size: 2.4rem; font-weight: 800; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow);">CRASHED!</h2>
      <div style="display: flex; gap: 20px; width: 100%; justify-content: center;">
        <div>
          <span class="score-label">SCORE</span>
          <div class="score-value" id="final-score-val" style="color: var(--primary);">0</div>
        </div>
        <div style="border-left: 1px solid var(--panel-border); padding-left: 20px;">
          <span class="score-label">COINS</span>
          <div class="score-value" id="final-coins-val" style="color: var(--gold);">0</div>
        </div>
      </div>
      <div style="border-top: 1px solid var(--panel-border); width: 100%; padding-top: 16px;">
        <span class="score-label" style="font-size: 0.9rem;">HIGH SCORE</span>
        <div style="font-size: 1.4rem; font-weight: 700; color: #fff;" id="game-over-high-val">0</div>
      </div>
      <button class="btn" id="restart-btn" style="background: linear-gradient(135deg, var(--accent) 0%, #be123c 100%); box-shadow: 0 8px 16px var(--accent-glow);">REPLAY</button>
      <button class="btn btn-secondary" id="game-over-home-btn">MAIN MENU</button>
    </div>
  </div>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // --- SYNTHETIC AUDIO ENGINE (Web Audio API) ---
    const AudioEngine = {
      ctx: null,
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      },
      playCoin() {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(987.77, now); // B5 note
        osc.frequency.setValueAtTime(1318.51, now + 0.08); // E6 note
        
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        
        osc.start(now);
        osc.stop(now + 0.35);
      },
      playJump() {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
        
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 0.25);
        
        osc.start(now);
        osc.stop(now + 0.25);
      },
      playSlide() {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(150, now + 0.3);
        
        // Low pass filter to simulate friction
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, now);
        filter.frequency.linearRampToValueAtTime(200, now + 0.3);
        
        osc.disconnect(gain);
        osc.connect(filter);
        filter.connect(gain);
        
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
        
        osc.start(now);
        osc.stop(now + 0.3);
      },
      playCrash() {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        
        // Synthesize noise buffer
        const bufferSize = this.ctx.sampleRate * 0.8;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        
        const noiseNode = this.ctx.createBufferSource();
        noiseNode.buffer = buffer;
        
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(300, now);
        filter.frequency.exponentialRampToValueAtTime(30, now + 0.8);
        
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
        
        noiseNode.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        
        noiseNode.start(now);
        noiseNode.stop(now + 0.8);
      }
    };

    // --- GAME ENGINE ---
    const Game = {
      // Configuration
      laneDistance: 3,
      lanes: [-3, 0, 3],
      targetLane: 1, // index: 0=Left, 1=Center, 2=Right
      
      // States
      state: 'MENU', // MENU, PLAYING, PAUSED, GAMEOVER
      score: 0,
      coins: 0,
      highScore: 0,
      speed: 15,
      maxSpeed: 45,
      speedIncrease: 0.05,
      
      // 3D parameters
      playerVelocityY: 0,
      playerGrounded: true,
      gravity: -38,
      jumpForce: 13,
      isSliding: false,
      slideTimer: 0,
      slideDuration: 0.8,
      
      // Pools/Items
      obstacles: [],
      coinsList: [],
      trackSegments: [],
      trackLength: 40,
      maxTracks: 5,
      
      init() {
        this.loadHighScore();
        this.setupThree();
        this.setupControls();
        this.setupUI();
        this.animate();
        
        // Pre-create initial road segments
        for (let i = 0; i < this.maxTracks; i++) {
          this.spawnTrack(i * this.trackLength);
        }
      },
      
      loadHighScore() {
        this.highScore = parseInt(localStorage.getItem('JZGame_HighScore')) || 0;
        document.getElementById('high-score-val').innerText = this.highScore;
      },
      
      saveHighScore() {
        if (this.score > this.highScore) {
          this.highScore = this.score;
          localStorage.setItem('JZGame_HighScore', this.highScore);
          document.getElementById('high-score-val').innerText = this.highScore;
        }
      },
      
      setupThree() {
        const container = document.getElementById('canvas-container');
        
        // Scene & Renderer
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x09090b, 0.015);
        
        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.set(0, 4.5, -6.5);
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio > 2 ? 2 : window.devicePixelRatio);
        this.renderer.shadowMap.enabled = true;
        container.appendChild(this.renderer.domElement);
        
        // Camera LookAt
        this.camera.lookAt(new THREE.Vector3(0, 1.5, 12));
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
        this.scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0x0d83ed, 0.8);
        dirLight.position.set(10, 25, -5);
        dirLight.castShadow = true;
        this.scene.add(dirLight);
        
        // Neon side lighting
        const leftLight = new THREE.PointLight(0xd946ef, 1.5, 50);
        leftLight.position.set(-8, 5, 10);
        this.scene.add(leftLight);
        
        // --- CREATE PLAYER MESH (Futuristic Hovercar) ---
        this.playerGroup = new THREE.Group();
        this.scene.add(this.playerGroup);
        
        // Car chassis
        const chassisGeom = new THREE.BoxGeometry(1.2, 0.3, 2.2);
        const chassisMat = new THREE.MeshStandardMaterial({ 
          color: 0x0f172a, 
          roughness: 0.1, 
          metalness: 0.9 
        });
        const chassis = new THREE.Mesh(chassisGeom, chassisMat);
        chassis.position.y = 0.2;
        chassis.castShadow = true;
        this.playerGroup.add(chassis);
        
        // Car cabin (glassmorphism/glowing cockpit)
        const cabinGeom = new THREE.BoxGeometry(0.8, 0.35, 1.2);
        const cabinMat = new THREE.MeshStandardMaterial({ 
          color: 0x0d83ed, 
          transparent: true, 
          opacity: 0.8,
          emissive: 0x0d83ed,
          emissiveIntensity: 0.3
        });
        const cabin = new THREE.Mesh(cabinGeom, cabinMat);
        cabin.position.set(0, 0.45, 0.1);
        this.playerGroup.add(cabin);

        // Glowing wings / side jets
        const wingLGeom = new THREE.BoxGeometry(0.3, 0.1, 1.2);
        const wingL = new THREE.Mesh(wingLGeom, chassisMat);
        wingL.position.set(-0.75, 0.2, -0.2);
        this.playerGroup.add(wingL);
        
        const wingR = wingL.clone();
        wingR.position.x = 0.75;
        this.playerGroup.add(wingR);
        
        // Wing engine glows (colored after the bird logo)
        const engineMat = new THREE.MeshBasicMaterial({ color: 0xd946ef });
        const engineL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, 0.2), engineMat);
        engineL.position.set(-0.9, 0.2, -0.7);
        this.playerGroup.add(engineL);
        
        const engineR = engineL.clone();
        engineR.position.x = 0.9;
        this.playerGroup.add(engineR);

        // Position Player at starting lane (center)
        this.playerGroup.position.set(this.lanes[this.targetLane], 0.4, 0);

        // Background space dust (Starfield particles)
        const starsGeom = new THREE.BufferGeometry();
        const starsCount = 400;
        const starPositions = new Float32Array(starsCount * 3);
        
        for (let i = 0; i < starsCount * 3; i += 3) {
          starPositions[i] = (Math.random() - 0.5) * 160;
          starPositions[i+1] = Math.random() * 40;
          starPositions[i+2] = Math.random() * 300 - 50;
        }
        
        starsGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.45, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starsGeom, starsMat);
        this.scene.add(stars);
        
        // Window Resize
        window.addEventListener('resize', () => {
          this.camera.aspect = window.innerWidth / window.innerHeight;
          this.camera.updateProjectionMatrix();
          this.renderer.setSize(window.innerWidth, window.innerHeight);
        });
      },
      
      spawnTrack(offsetZ) {
        const trackGroup = new THREE.Group();
        trackGroup.position.z = offsetZ;
        
        // Main Road Plane
        const roadGeom = new THREE.PlaneGeometry(10, this.trackLength);
        const roadMat = new THREE.MeshStandardMaterial({ 
          color: 0x111116, 
          roughness: 0.6 
        });
        const road = new THREE.Mesh(roadGeom, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.receiveShadow = true;
        trackGroup.add(road);
        
        // Neon borders
        const borderMatL = new THREE.MeshBasicMaterial({ color: 0x0d83ed });
        const borderMatR = new THREE.MeshBasicMaterial({ color: 0xd946ef });
        
        const borderL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, this.trackLength), borderMatL);
        borderL.position.set(-5, 0.05, 0);
        trackGroup.add(borderL);
        
        const borderR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, this.trackLength), borderMatR);
        borderR.position.set(5, 0.05, 0);
        trackGroup.add(borderR);
        
        // Lane dividers (dashed glowing marks)
        const markMat = new THREE.MeshBasicMaterial({ color: 0x27272a });
        for (let i = -this.trackLength / 2; i < this.trackLength / 2; i += 8) {
          const m1 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.02, 3), markMat);
          m1.position.set(-1.5, 0.01, i + 4);
          trackGroup.add(m1);
          
          const m2 = m1.clone();
          m2.position.x = 1.5;
          trackGroup.add(m2);
        }
        
        this.scene.add(trackGroup);
        this.trackSegments.push(trackGroup);
      },
      
      setupControls() {
        // Keyboard movement
        window.addEventListener('keydown', (e) => {
          if (this.state !== 'PLAYING') return;
          
          if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
            this.changeLane(-1);
          } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
            this.changeLane(1);
          } else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') {
            this.jump();
          } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
            this.slide();
          }
        });
        
        // Touch Swipes (Mobile)
        let touchStartX = 0;
        let touchStartY = 0;
        
        window.addEventListener('touchstart', (e) => {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        }, { passive: true });
        
        window.addEventListener('touchend', (e) => {
          if (this.state !== 'PLAYING') return;
          
          const diffX = e.changedTouches[0].clientX - touchStartX;
          const diffY = e.changedTouches[0].clientY - touchStartY;
          
          if (Math.abs(diffX) > Math.abs(diffY)) {
            // Horizontal swipe
            if (Math.abs(diffX) > 40) {
              if (diffX > 0) this.changeLane(1);
              else this.changeLane(-1);
            }
          } else {
            // Vertical swipe
            if (Math.abs(diffY) > 40) {
              if (diffY < 0) this.jump();
              else this.slide();
            }
          }
        }, { passive: true });
      },
      
      changeLane(dir) {
        let newLaneIndex = this.targetLane + dir;
        if (newLaneIndex >= 0 && newLaneIndex <= 2) {
          this.targetLane = newLaneIndex;
        }
      },
      
      jump() {
        if (this.playerGrounded && !this.isSliding) {
          this.playerVelocityY = this.jumpForce;
          this.playerGrounded = false;
          AudioEngine.playJump();
        }
      },
      
      slide() {
        if (this.playerGrounded && !this.isSliding) {
          this.isSliding = true;
          this.slideTimer = this.slideDuration;
          AudioEngine.playSlide();
          
          // Animate squash height
          this.playerGroup.scale.set(1, 0.45, 1);
        }
      },
      
      setupUI() {
        const menuPanel = document.getElementById('menu-panel');
        const hud = document.getElementById('hud');
        const pausePanel = document.getElementById('pause-panel');
        const gameOverPanel = document.getElementById('game-over-panel');
        
        // Play
        document.getElementById('play-btn').onclick = () => this.startGame();
        
        // Pause
        document.getElementById('pause-btn').onclick = () => {
          this.state = 'PAUSED';
          pausePanel.classList.add('active');
        };
        
        // Resume
        document.getElementById('resume-btn').onclick = () => {
          this.state = 'PLAYING';
          pausePanel.classList.remove('active');
        };
        
        // Restart Pause
        document.getElementById('restart-pause-btn').onclick = () => {
          pausePanel.classList.remove('active');
          this.startGame();
        };
        
        // Exit to main menu
        document.getElementById('exit-btn').onclick = () => {
          pausePanel.classList.remove('active');
          this.resetToMenu();
        };
        
        // Restart Game Over
        document.getElementById('restart-btn').onclick = () => {
          gameOverPanel.classList.remove('active');
          this.startGame();
        };
        
        // Home Game Over
        document.getElementById('game-over-home-btn').onclick = () => {
          gameOverPanel.classList.remove('active');
          this.resetToMenu();
        };
      },
      
      startGame() {
        AudioEngine.init();
        
        // Clear active items
        this.clearItems();
        
        // Reset states
        this.score = 0;
        this.coins = 0;
        this.speed = 18;
        this.targetLane = 1;
        this.playerVelocityY = 0;
        this.playerGrounded = true;
        this.isSliding = false;
        this.playerGroup.position.set(this.lanes[this.targetLane], 0.4, 0);
        this.playerGroup.scale.set(1, 1, 1);
        
        // Spawn distance index offset
        this.spawnZCounter = 40;
        
        document.getElementById('score-val').innerText = '0';
        document.getElementById('coins-val').innerText = '0';
        
        // Enable UI
        document.getElementById('menu-panel').classList.remove('active');
        document.getElementById('hud').classList.add('active');
        
        this.state = 'PLAYING';
      },
      
      resetToMenu() {
        this.state = 'MENU';
        this.clearItems();
        document.getElementById('hud').classList.remove('active');
        document.getElementById('menu-panel').classList.add('active');
        this.loadHighScore();
      },
      
      clearItems() {
        // Remove active obstacles
        this.obstacles.forEach(obs => this.scene.remove(obs.mesh));
        this.obstacles = [];
        
        // Remove active coins
        this.coinsList.forEach(coin => this.scene.remove(coin.mesh));
        this.coinsList = [];
      },
      
      gameOver() {
        this.state = 'GAMEOVER';
        AudioEngine.playCrash();
        this.saveHighScore();
        
        document.getElementById('final-score-val').innerText = this.score;
        document.getElementById('final-coins-val').innerText = this.coins;
        document.getElementById('game-over-high-val').innerText = this.highScore;
        
        document.getElementById('hud').classList.remove('active');
        document.getElementById('game-over-panel').classList.add('active');
      },
      
      spawnObstacleOrCoin(zPos) {
        // Select random lane
        const laneIdx = Math.floor(Math.random() * 3);
        const laneX = this.lanes[laneIdx];
        
        // 45% obstacle, 40% coin, 15% empty
        const rand = Math.random();
        
        if (rand < 0.45) {
          // Obstacle Type: Low barrier (requires Jump) or High laser gate (requires Slide)
          const isHighGate = Math.random() < 0.4;
          
          let mesh;
          if (isHighGate) {
            // High floating bar (requires Slide)
            const gateGroup = new THREE.Group();
            
            // Side stands
            const standGeom = new THREE.CylinderGeometry(0.08, 0.08, 2);
            const standMat = new THREE.MeshStandardMaterial({ color: 0x3f3f46, metalness: 0.8 });
            
            const standL = new THREE.Mesh(standGeom, standMat);
            standL.position.set(-1, 1, 0);
            gateGroup.add(standL);
            
            const standR = standL.clone();
            standR.position.x = 1;
            gateGroup.add(standR);
            
            // Cross beam (laser fence)
            const barGeom = new THREE.BoxGeometry(2.2, 0.25, 0.15);
            const barMat = new THREE.MeshBasicMaterial({ color: 0xf43f5e }); // Glowing red laser
            const bar = new THREE.Mesh(barGeom, barMat);
            bar.position.set(0, 1.65, 0);
            gateGroup.add(bar);
            
            gateGroup.position.set(laneX, 0, zPos);
            this.scene.add(gateGroup);
            mesh = gateGroup;
            
            this.obstacles.push({
              mesh: mesh,
              type: 'HIGH',
              hitbox: new THREE.Box3()
            });
          } else {
            // Low concrete block/barrier (requires Jump)
            const barrierGeom = new THREE.BoxGeometry(2.4, 0.75, 0.8);
            const barrierMat = new THREE.MeshStandardMaterial({ 
              color: 0xe11d48, // Crimson warning
              roughness: 0.8,
              metalness: 0.1
            });
            const barrier = new THREE.Mesh(barrierGeom, barrierMat);
            barrier.position.set(laneX, 0.375, zPos);
            barrier.castShadow = true;
            this.scene.add(barrier);
            mesh = barrier;
            
            this.obstacles.push({
              mesh: mesh,
              type: 'LOW',
              hitbox: new THREE.Box3()
            });
          }
        } 
        else if (rand < 0.85) {
          // Coin Spawning (glowing torus)
          const coinGeom = new THREE.TorusGeometry(0.35, 0.1, 8, 24);
          const coinMat = new THREE.MeshStandardMaterial({ 
            color: 0xfbbf24, // Gold
            roughness: 0.1,
            metalness: 0.9,
            emissive: 0xfbbf24,
            emissiveIntensity: 0.25
          });
          const coin = new THREE.Mesh(coinGeom, coinMat);
          coin.position.set(laneX, 0.65, zPos);
          this.scene.add(coin);
          
          this.coinsList.push({
            mesh: coin,
            hitbox: new THREE.Box3()
          });
        }
      },
      
      animate() {
        requestAnimationFrame(() => this.animate());
        
        const delta = 1 / 60; // Locked delta fallback for uniform frame dynamics
        
        if (this.state === 'PLAYING') {
          // Increase forward speed slowly over time
          if (this.speed < this.maxSpeed) {
            this.speed += this.speedIncrease * delta;
          }
          
          // Increment Score
          this.score += Math.floor(this.speed * delta);
          document.getElementById('score-val').innerText = this.score;
          
          // 1. Move Player smoothly side-to-side towards target lane
          const targetX = this.lanes[this.targetLane];
          this.playerGroup.position.x = THREE.MathUtils.lerp(this.playerGroup.position.x, targetX, 12 * delta);
          
          // 2. Jump/Gravity simulation
          if (!this.playerGrounded) {
            this.playerVelocityY += this.gravity * delta;
            this.playerGroup.position.y += this.playerVelocityY * delta;
            
            // Ground check
            if (this.playerGroup.position.y <= 0.4) {
              this.playerGroup.position.y = 0.4;
              this.playerVelocityY = 0;
              this.playerGrounded = true;
            }
          }
          
          // 3. Slide timer countdown
          if (this.isSliding) {
            this.slideTimer -= delta;
            if (this.slideTimer <= 0) {
              this.isSliding = false;
              // Restore size scale smoothly
              this.playerGroup.scale.set(1, 1, 1);
            }
          }
          
          // 4. Scroll Track Segments towards player (gives moving forward effect)
          this.trackSegments.forEach(track => {
            track.position.z -= this.speed * delta;
            
            // Recycle segment once passed Z = -40
            if (track.position.z <= -this.trackLength) {
              // Move it to the far end
              let maxZ = 0;
              this.trackSegments.forEach(t => { if(t.position.z > maxZ) maxZ = t.position.z; });
              track.position.z = maxZ + this.trackLength;
            }
          });
          
          // 5. Scroll items (Obstacles and Coins) and manage spawning
          this.spawnZCounter -= this.speed * delta;
          if (this.spawnZCounter <= 0) {
            // Spawn next set of items at Z = 120
            this.spawnObstacleOrCoin(120);
            this.spawnZCounter = Math.random() * 20 + 20; // Spawn interval in Z units
          }
          
          // Update & check Obstacles
          const playerBox = new THREE.Box3().setFromObject(this.playerGroup);
          
          for (let i = this.obstacles.length - 1; i >= 0; i--) {
            const obs = this.obstacles[i];
            obs.mesh.position.z -= this.speed * delta;
            
            // Collision detection
            obs.hitbox.setFromObject(obs.mesh);
            
            if (playerBox.intersectsBox(obs.hitbox)) {
              this.gameOver();
              break;
            }
            
            // Clean up off-screen obstacles
            if (obs.mesh.position.z < -10) {
              this.scene.remove(obs.mesh);
              this.obstacles.splice(i, 1);
            }
          }
          
          // Update & check Coins
          if (this.state === 'PLAYING') {
            for (let i = this.coinsList.length - 1; i >= 0; i--) {
              const coin = this.coinsList[i];
              coin.mesh.position.z -= this.speed * delta;
              coin.mesh.rotation.y += 3.5 * delta; // Spin coin
              
              coin.hitbox.setFromObject(coin.mesh);
              
              if (playerBox.intersectsBox(coin.hitbox)) {
                // Collect coin!
                this.coins++;
                document.getElementById('coins-val').innerText = this.coins;
                AudioEngine.playCoin();
                
                // Remove from scene and list
                this.scene.remove(coin.mesh);
                this.coinsList.splice(i, 1);
                continue;
              }
              
              // Clean up offscreen coins
              if (coin.mesh.position.z < -10) {
                this.scene.remove(coin.mesh);
                this.coinsList.splice(i, 1);
              }
            }
          }
        }
        
        // Render
        this.renderer.render(this.scene, this.camera);
      }
    };

    // Initialize Game
    window.onload = () => {
      Game.init();
      
      // Register PWA Service Worker for Offline access
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW Registration Failed: ", err));
      }
    };
  </script>
